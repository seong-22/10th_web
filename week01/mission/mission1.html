<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ToDoList 제작</title>
        <link rel="stylesheet" href="/week01/mission/missionStyle.css">
        <script type="module" src="dist/mission1.js" defer></script>
    </head>
    <body>
        <div class="todo-container">
            <header>
                <h1 class="center">UMC Study Plan</h1>
            </header>

            <form id="todo_form" class="todo-container__form">
                <input class="todo-container__input" type="text" id="todo_input" placeholder="스터디 계획을 작성해보세요!" required>
                <button type="submit" class="todo-container__btn">할 일 추가</button>
            </form>

            <div class="render-container">
                <section class="render-container__section">
                    <h2 class="render-container__title">해야 할 일</h2>
                    <ul id="todo_list" class="render-container__list"></ul>
                </section>

                <section class="render-container__section">
                    <h2 class="render-container__title">해낸 일</h2>
                    <ul id="done_list" class="render-container__list"></ul>
                </section>
            </div>
        </div>
    </body>
</html>
